<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sandriel Barbearia — Agendamento</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="overlay"></div>

  <header class="topo">
    <img src="assets/logosandriel.png" alt="Sandriel Barbearia" class="logo" />
  </header>

  <main class="container">

    <!-- 1. PROFISSIONAL -->
    <section class="secao">
      <h2 class="titulo-secao">1. Escolha o Profissional</h2>
      <div id="lista-profissionais" class="grid-cards">
        <p class="carregando">Carregando profissionais...</p>
      </div>
    </section>

    <!-- 2. SERVIÇO -->
    <section class="secao">
      <h2 class="titulo-secao">2. Escolha o Serviço</h2>
      <div id="lista-servicos" class="grid-cards">
        <p class="carregando">Carregando serviços...</p>
      </div>
    </section>

    <!-- 3. HORÁRIO -->
    <section class="secao">
      <h2 class="titulo-secao">3. Escolha o Horário</h2>

      <div class="dias-wrapper">
        <div id="lista-dias" class="lista-dias"></div>
      </div>

      <div id="lista-horarios" class="grid-horarios">
        <p class="info-horario">Selecione um profissional e um dia.</p>
      </div>
    </section>

    <!-- 4. DADOS -->
    <section class="secao">
      <h2 class="titulo-secao">4. Seus Dados</h2>
      <form id="form-agendamento" class="form-dados">
        <input type="text" id="nome" placeholder="Seu nome completo" required />
        <input type="tel" id="telefone" placeholder="Telefone (WhatsApp)" required />
        <button type="submit" class="btn-confirmar">Confirmar Agendamento</button>
      </form>
      <p id="mensagem" class="mensagem"></p>
    </section>

  </main>

  <footer class="rodape">
    <p>© Sandriel Barbearia — Todos os direitos reservados</p>
  </footer>

  <!-- Firebase -->
  <script type="module" src="js/cliente.js"></script>
</body>
</html>
